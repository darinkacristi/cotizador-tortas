    <!--
      Punto de entrada de Vite. Aquí debe usarse "/src/main.jsx":
      Vite lo interpreta como relativo a la raíz del proyecto (NO es una
      ruta absoluta del sistema). Es la forma estándar y la única que
      compila correctamente en Vercel. Los imports dentro de los .jsx
      siguen siendo todos relativos.
    -->
    <script type="module" src="/src/main.jsx"></script>
